syntax = "proto3";

package model;

option go_package = "";

// DAO 调用载荷，oneof 中每个字段对应一种 DAO 操作。
message DaoCall {
  oneof call {
    DaoInit init = 1;
    DaoPublicJoin public_join = 2;
    DaoJoin join = 3;
    DaoLeave leave = 4;
    DaoLeaveWithBurn leave_with_burn = 5;
    DaoSubmitProposal submit_proposal = 6;
    DaoDepositProposal deposit_proposal = 7;
    DaoSubmitVote submit_vote = 8;
    DaoCancelVote cancel_vote = 9;
    DaoUnlock unlock = 10;
    DaoExecProposal exec_proposal = 11;
    DaoCancelProposal cancel_proposal = 12;
    DaoTransfer transfer = 13;
    DaoApprove approve = 14;
    DaoTransferFrom transfer_from = 15;
    DaoSpend spend = 16;
    DaoPayout payout = 17;
    DaoSetPublicJoin set_public_join = 18;
    DaoAddTrack add_track = 19;
    DaoSetDefaultTrack set_default_track = 20;
  }
}

// 成员 + 余额（u128 为 16 字节大端）
message DaoMember {
  bytes account = 1;
  bytes balance = 2;
}

message DaoTrackData {
  string name = 1;
  uint32 prepare_period = 2;
  uint32 max_deciding = 3;
  uint32 confirm_period = 4;
  uint32 decision_period = 5;
  uint32 min_enactment_period = 6;
  bytes decision_deposit = 7;
  bytes max_balance = 8;
}

message DaoCallContent {
  bytes contract = 1;
  bytes selector = 2;
  bytes input = 3;
  bytes amount = 4;
  uint64 ref_time_limit = 5;
  bool allow_reentry = 6;
}

message DaoInit {
  repeated DaoMember initial_members = 1;
  bool public_join = 2;
  bytes sudo_account = 3;
  DaoTrackData default_track = 4;
}

message DaoPublicJoin {}

message DaoJoin {
  bytes new_user = 1;
  bytes balance = 2;
}

message DaoLeave {}

message DaoLeaveWithBurn {}

message DaoSubmitProposal {
  DaoCallContent call = 1;
  uint32 track_id = 2;
}

message DaoDepositProposal {
  uint32 proposal_id = 1;
  bytes amount = 2;
}

message DaoSubmitVote {
  uint32 proposal_id = 1;
  bool opinion_yes = 2;
  bytes lock_amount = 3;
}

message DaoCancelVote {
  uint64 vote_id = 1;
}

message DaoUnlock {
  uint64 vote_id = 1;
}

message DaoExecProposal {
  uint32 proposal_id = 1;
}

message DaoCancelProposal {
  uint32 proposal_id = 1;
}

message DaoTransfer {
  bytes to = 1;
  bytes value = 2;
}

message DaoApprove {
  bytes spender = 1;
  bytes value = 2;
}

message DaoTransferFrom {
  bytes from = 1;
  bytes to = 2;
  bytes value = 3;
}

message DaoSpend {
  bytes to = 1;
  bytes amount = 2;
  uint32 track_id = 3;
}

message DaoPayout {
  uint64 spend_id = 1;
}

message DaoSetPublicJoin {
  bool public_join = 1;
}

message DaoAddTrack {
  DaoTrackData track = 1;
}

message DaoSetDefaultTrack {
  uint32 track_id = 1;
}
